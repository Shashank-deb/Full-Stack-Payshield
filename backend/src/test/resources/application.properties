# backend/src/test/resources/application.properties
# Test-specific application properties

# Use test profile by default
spring.profiles.active=test

# Database configuration for tests (H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests
spring.flyway.enabled=false

# H2 Console (for debugging tests)
spring.h2.console.enabled=true

# Encryption configuration
app.encryption.key=NywLhbIA9UvNfurxHK6JkZKYP7g6M4k1qGPAXMMppiQ=
app.encryption.key-version=1

# JWT configuration
security.jwt.secret=test-jwt-secret-key-that-is-long-enough-for-hmac-sha256-algorithm-tests-12345
security.jwt.ttl-seconds=3600

# Bootstrap configuration
bootstrap.admin.email=test-admin@example.com
bootstrap.admin.password=test-password
bootstrap.defaultTenantId=00000000-0000-0000-0000-000000000001

# Disable security features for testing
app.clamav.enabled=false
app.upload.validate-content=false
app.upload.strict-mime-check=false

# Logging
logging.level.root=WARN
logging.level.com.payshield.frauddetector=INFO
logging.level.org.springframework.security=WARN