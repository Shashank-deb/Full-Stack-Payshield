# backend/src/test/resources/application-test.yml

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  h2:
    console:
      enabled: true

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25
    username: test
    password: test

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# CRITICAL: Application encryption configuration for tests
app:
  encryption:
    key: ${PSP_AES_KEY:NywLhbIA9UvNfurxHK6JkZKYP7g6M4k1qGPAXMMppiQ=}  # Base64 encoded 32-byte key
    key-version: 1
    algorithm: AES-256-GCM

  # File upload settings
  upload:
    max-file-size: 10MB
    validate-content: false  # Disable for tests
    strict-mime-check: false # Disable for tests

  # ClamAV disabled for tests
  clamav:
    enabled: false
    fail-secure: false

  # Storage settings
  storage:
    basePath: ${java.io.tmpdir}/payshield-test

  # Outbox settings
  outbox:
    enabled: true
    poll-ms: 10000  # Longer polling for tests
    batch-size: 10

  # MFA settings for tests
  mfa:
    totp:
      issuer-name: PayShield-Test
      digits: 6
      period-seconds: 30
      window-size: 1
    backup-codes:
      count: 10
      length: 8
    trusted-devices:
      enabled: true
      expiry-days: 30
    rate-limiting:
      max-attempts: 5
      lockout-duration-minutes: 60
      window-minutes: 15

# Security configuration for tests
security:
  jwt:
    secret: test-jwt-secret-key-that-is-long-enough-for-hmac-sha256-algorithm-tests-12345
    ttl-seconds: 3600

# Bootstrap configuration for tests
bootstrap:
  admin:
    email: test-admin@example.com
    password: test-password
  defaultTenantId: 00000000-0000-0000-0000-000000000001

# Server configuration
server:
  port: 0  # Random port for tests
  error:
    include-stacktrace: always
    include-message: always

# Management/Actuator for tests
management:
  server:
    port: 0  # Random port for tests
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging configuration for tests
logging:
  level:
    root: WARN
    com.payshield.frauddetector: INFO
    org.springframework.security: WARN
    org.springframework.boot.test: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.flywaydb: WARN

# Disable OpenAPI for tests
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false